<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        height: 100000px;
    }
    img{
        width: 250px;
        height: 250px;
        margin: 50px;
    }
     
    .img1{
        position: fixed;

    }
    
    .img2{
        position: relative;
        top: 50px;
        
    }
    
    .img3{
        position: absolute;
    }
    .img4{
        position: sticky;
        background-color: black;
        top:500px;
    }
    .box{
        background-color: beige;
        height:7000px;
    }

    
</style>
<body>
    <div class="container">
    <img src="images/kitten1.jpg" alt="kitten1" class="img1">
    <img src="images/kitten2.jpg" alt="kitten2" class="img2">
    <img src="images/kitten3.jpg" alt="kitten3" class="img3">
    <img src="images/kitten4.jpg" alt="kitten4" class="img4">
    </div>
    <div class="box">
        

    </div>
</body>
</html>
