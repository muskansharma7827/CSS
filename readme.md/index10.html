<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            border: 2px solid black;
            background-color: darkmagenta;      
        }
        .box{
            width: 350px;
            height: 80px;
            background-color: rgb(20, 125, 154);
            border: 3px solid aqua;
            border-radius: 20px;
            margin: 10px;
            animation-name: example;
            position: relative;
            /*animation-duration: 10s;
            animation-iteration-count: 1;
            /*animation-delay: 2s;*/
            /*animation-timing-function: linear;*/
            /*animation-timing-function: ease-in;
            animation-timing-function: cubic-bezier(0.075, 0.82, 0.165, 1);
            /*animation-direction: alternate;*/
            /*animation-direction: alternate-reverse;*/
            /*animation-direction: reverse;
            animation-fill-mode: backwards;*/
            animation: 3s linear 2s 2 alternate both running example;
        }
        @keyframes example{
            from {
                top: 0;
                left: 0;
            }
               
            to{
                top: 0;
                left: 1900px ;
                
            }
        }
        
        .box2{
            width: 350px;
            height: 80px;
            background-color: rgb(20, 125, 154);
            border: 3px solid aqua;
            border-radius: 20px;
            margin: 10px;
            animation-name: example;
            position: relative;
            animation: 3s ease-in 2s 2 alternate both running example2;

        }
        @keyframes example2{
            from{
                top: 680px;
                left: 1350px;
            }
            to{
                top: 700px;
                left: 0px;
            }
        }
        #circle{
            width: 100px;
            height: 200px;
            background-color: rgb(20, 125, 154);
            border: 3px solid aqua;
            margin: 10px;
            border-radius: 1000px;
            top: 30%;
            left: 40%;
            position: relative;
            animation: 10s ease-in-out 0s infinite alternate-reverse none running circle;
        }
        @keyframes  circle{
            1%{
                top: 1%;
                left: 5%;
            }
            30%{
                top: 5%;
                left: 90%;
            }
            60%{
                top: 50%;
                left: 5%;
            }
            100%{
                top: 55%;
                left: 90%;
            }




        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            THIS IS A BOX.
        </div>
        <div class="box2">
            this is box2
        </div>
        <div id="circle"></div>
    
    </div>
    
    
</body>
</html>
